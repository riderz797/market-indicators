name: Weekly Indicator Update

on:
  schedule:
    - cron: '0 8 * * 1'   # Every Monday at 8:00 AM UTC
  workflow_dispatch:       # Allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas yfinance matplotlib

      - name: Run US Business Cycle update
        continue-on-error: true   # FRED outages must not abort downstream steps
        run: python fetch_usbc.py

      - name: Run rebuild_all (all other indicators)
        continue-on-error: true
        run: python rebuild_all.py

      - name: Run Capital Flows update
        continue-on-error: true
        run: python fetch_capital_flows.py

      - name: Bake S&P 500 seasonality data
        continue-on-error: true
        run: python bake_sp500.py > sp500_baked.js.tmp && mv sp500_baked.js.tmp sp500_baked.js || echo "bake_sp500 failed, keeping existing data"

      - name: Bake BTC seasonality data
        continue-on-error: true
        run: python bake_btc.py > btc_baked.js.tmp && mv btc_baked.js.tmp btc_baked.js || echo "bake_btc failed, keeping existing data"

      - name: Commit and push updated indicators
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add indicators/ scripts/ btc_baked.js sp500_baked.js
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Weekly indicator update $(date +'%a %m/%d/%Y')"
            git push
          fi
