name: Weekly Indicator Update

on:
  schedule:
    - cron: '0 8 * * 1'   # Every Monday at 8:00 AM UTC
  workflow_dispatch:       # Allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas yfinance

      - name: Run US Business Cycle update
        run: python fetch_usbc.py

      - name: Run rebuild_all (all other indicators)
        run: python rebuild_all.py

      - name: Commit and push updated indicators
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add indicators/ scripts/ btc_baked.js sp500_baked.js
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Weekly indicator update $(date +'%a %m/%d/%Y')"
            git push
          fi
