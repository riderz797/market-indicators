name: Update BNHI Weekly

on:
  schedule:
    - cron: '30 12 * * 1'  # Monday 07:30 EST (12:30 UTC) / 08:30 EDT
  workflow_dispatch:        # Allow manual trigger from GitHub Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install numpy pandas requests

      - name: Run BNHI build
        run: python build_bnhi.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add indicators/btc/bnhi_baked.js
          git diff --staged --quiet && echo "No changes — skipping commit" || (
            git commit -m "Auto-update BNHI data [$(date -u +%Y-%m-%d)]" &&
            git push
          )
