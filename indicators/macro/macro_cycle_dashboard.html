<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Macro Cycle Dashboard — Acumen</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #191919; }
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 14px; color: #AAAAAA; text-decoration: none;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 12px; letter-spacing: 0.5px;
      position: fixed; top: 12px; left: 16px; z-index: 100;
      border: 1px solid #333; border-radius: 6px; background: #1E1E1E;
      transition: color 0.2s, border-color 0.2s;
    }
    .back-link:hover { color: #F5C542; border-color: #F5C542; }
    textarea:focus, input:focus { outline: none; border-color: #F5C542 !important; }
  </style>
</head>
<body>
  <a href="../../index.html" class="back-link">&#8592; Dashboard</a>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    /* ═══ CONFIG ═══════════════════════════════════════════════════════════
       Free FRED API key: https://fred.stlouisfed.org/docs/api/api_key.html
    ═══════════════════════════════════════════════════════════════════════ */
    const FRED_API_KEY = "824b29c5afa52f3fc7c6e7dc4925aebb";

    /* ── DYNAMIC DATE ─────────────────────────────────────────────────── */
    const _now          = new Date();
    const CURRENT_YEAR  = _now.getFullYear();
    const CURRENT_MONTH = _now.getMonth() + 1;
    const MONTHS        = ["January","February","March","April","May","June",
                           "July","August","September","October","November","December"];
    const MONTH_LABEL   = `${MONTHS[CURRENT_MONTH - 1]} ${CURRENT_YEAR}`;

    /* ── ANALYSIS STORAGE ─────────────────────────────────────────────── */
    const STORAGE_KEY = "acumen_macro_analysis_v1";

    const DEFAULT_ANALYSIS = {
      thesis: "The clock and the engine are diverging.",
      body: "Benner's cycle clock places us at a predicted peak (100% progress from 2023 trough to 2026 B-peak). However, the mechanical indicators are split:",
      confirmingHeader: "CONFIRMING PEAK",
      confirmingBullets: "Yield curve steepening during cuts — historically precedes recessions\nSLOOS shows banks tightening — real economy impact in 2–4 quarters\nReal yields elevated at 1.80% — still pressuring leveraged positions\nForeign Treasury demand declining — structural flow shift\nCentral bank gold buying at records — reserve regime stress",
      contradictingHeader: "CONTRADICTING PEAK",
      contradictingBullets: "Credit spreads at 286bps — near historic tights, no stress\nFed cutting gradually — liquidity still easing\nDollar weakening — reduces global tightening pressure\nCredit cycle only ~2-3 years old (young vs. 5-7yr historical)\nNo acute credit event visible yet",
      readParagraph: "The setup rhymes with 1972 and 2016 — Benner B-peak years where markets were elevated and structural risks were building, but the credit cycle hadn't reached terminal excess. Both produced significant corrections (not crashes) followed by resumed expansion before the eventual credit cycle peak. **Watch the HY spreads.** If they break above 400bps with velocity, the peak confirmation strengthens dramatically.",
      dataInputs: "CREDIT: HY OAS: 286bps (Feb 19) — ICE BofA via FRED. Near post-financial-crisis lows, compressing.\nCREDIT: SLOOS: Banks tightened C&I standards for all firm sizes (Jan 2026 survey, released Feb 3) — Federal Reserve.\nRATE: 2s10s: +60bps (10Y: 4.08%, 2Y: 3.48%) — Widest since Jan 2022. Steepening during rate cuts. — FRED T10Y2Y.\nRATE: 10Y TIPS: 1.80% real yield (Feb 20) — FRED DFII10. 30Y TIPS at 2.47%, second highest in 16 years.\nRATE: Fed Funds: 3.50-3.75% (175bps of cuts since Sep 2024). On hold at Jan 2026 meeting. — Federal Reserve.\nFLOW: Foreign Demand: China reduced holdings ~$210B since 2022. BRICS+ building alternative payment systems. — Treasury TIC.\nFLOW: Central Bank Gold: Record 1,078 tonnes in 2024 — World Gold Council. Concentrated in BRICS+ nations.\nFLOW: DXY: 97.5 (Feb 23). Down 8.5% year-over-year. 4-year low of 95.5 on Jan 30. — FRED DTWEXBGS.",
    };

    function loadAnalysis() {
      try {
        const s = localStorage.getItem(STORAGE_KEY);
        return s ? { ...DEFAULT_ANALYSIS, ...JSON.parse(s) } : DEFAULT_ANALYSIS;
      } catch { return DEFAULT_ANALYSIS; }
    }

    function saveAnalysis(a) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(a)); } catch (_) {}
    }

    /* ── CLAUDE OUTPUT PARSER ──────────────────────────────────────────── */
    function parseClaudeOutput(text) {
      const getSection = (key) => {
        const re = new RegExp(`===\\s*${key}\\s*===\\s*\\n([\\s\\S]*?)(?=\\n===|$)`, 'i');
        const m = text.match(re);
        return m ? m[1].trim() : null;
      };
      const map = [
        ['THESIS',                 'thesis'],
        ['BODY',                   'body'],
        ['CONFIRMING_HEADER',      'confirmingHeader'],
        ['CONFIRMING_BULLETS',     'confirmingBullets'],
        ['CONTRADICTING_HEADER',   'contradictingHeader'],
        ['CONTRADICTING_BULLETS',  'contradictingBullets'],
        ['READ',                   'readParagraph'],
        ['DATA_INPUTS',            'dataInputs'],
      ];
      const result = {};
      map.forEach(([key, field]) => {
        const v = getSection(key);
        if (v) result[field] = v;
      });
      return result;
    }

    /* ── RENDER HELPERS ────────────────────────────────────────────────── */
    function renderBold(text) {
      if (!text) return null;
      return text.split(/(\*\*[^*]+\*\*)/g).map((p, i) =>
        p.startsWith('**') && p.endsWith('**')
          ? <strong key={i} style={{ color: '#CCC' }}>{p.slice(2, -2)}</strong>
          : p
      );
    }

    function parseDataLines(text) {
      return (text || '').split('\n').filter(l => l.trim()).map((line, i) => {
        let color = '#888', body = line;
        if      (line.startsWith('CREDIT:')) { color = '#3b82f6'; body = line.slice(7).trim(); }
        else if (line.startsWith('RATE:'))   { color = '#eab308'; body = line.slice(5).trim(); }
        else if (line.startsWith('FLOW:'))   { color = '#a855f7'; body = line.slice(5).trim(); }
        return { color, body, key: i };
      });
    }

    function parseBullets(text) {
      return (text || '').split('\n').filter(l => l.trim()).map(l => l.replace(/^[•\-]\s*/, '').trim());
    }

    /* ── BENNER DATA ───────────────────────────────────────────────────── */
    const BENNER_DATA = {
      peaks:  [1926,1935,1945,1953,1962,1972,1980,1989,1999,2007,2016,2026,2034,2043,2053],
      troughs:[1924,1931,1942,1951,1958,1969,1978,1985,1996,2005,2012,2023,2032,2039,2050],
      panics: [1927,1945,1965,1981,1999,2019,2035,2053]
    };

    /* ── INDICATORS ────────────────────────────────────────────────────── */
    const indicators = [
      { id:"hy_spreads",   name:"HY Credit Spreads (OAS)", category:"credit",
        desc:"High-yield OAS spread level & velocity — FRED: BAMLH0A0HYM2",
        options:[
          { label:"Compressing (<350bps, tightening)",    value:-2 },
          { label:"Stable / Low (350-450bps)",            value:-1 },
          { label:"Neutral (450-550bps)",                 value: 0 },
          { label:"Widening (550-700bps)",                value: 1 },
          { label:"Blowout (>700bps, accelerating)",      value: 2 }
        ]},
      { id:"sloos",        name:"SLOOS Lending Standards", category:"credit",
        desc:"Fed Senior Loan Officer Survey — bank lending tightness — FRED: DRTSCILM",
        options:[
          { label:"Easing significantly",     value:-2 },
          { label:"Easing modestly",          value:-1 },
          { label:"Roughly unchanged",        value: 0 },
          { label:"Tightening modestly",      value: 1 },
          { label:"Tightening significantly", value: 2 }
        ]},
      { id:"yield_curve",  name:"Yield Curve (2s10s)", category:"rate",
        desc:"Shape and direction of the 2-year / 10-year spread — FRED: T10Y2Y",
        options:[
          { label:"Deeply inverted (< -50bps)",         value:-1 },
          { label:"Inverted (-50 to 0bps)",             value: 0 },
          { label:"Flat to mildly steep (0-50bps)",     value: 1 },
          { label:"Steepening during cuts (50-150bps)", value: 2 },
          { label:"Steep (>150bps) — recovery mode",    value:-1 }
        ]},
      { id:"real_yields",  name:"Real Yields (10Y TIPS)", category:"rate",
        desc:"Inflation-adjusted Treasury yield — FRED: DFII10",
        options:[
          { label:"Deeply negative (< -1%)",   value:-2 },
          { label:"Negative (-1% to 0%)",      value:-1 },
          { label:"Low positive (0% to 1.5%)", value: 0 },
          { label:"Elevated (1.5% to 2.5%)",   value: 1 },
          { label:"Restrictive (>2.5%)",        value: 2 }
        ]},
      { id:"fed_direction",name:"Fed Policy Direction", category:"rate",
        desc:"Current trajectory of the federal funds rate — FRED: FEDFUNDS (year-over-year change)",
        options:[
          { label:"Aggressively cutting", value:-2 },
          { label:"Cutting gradually",    value:-1 },
          { label:"On hold",              value: 0 },
          { label:"Hiking gradually",     value: 1 },
          { label:"Aggressively hiking",  value: 2 }
        ]},
      { id:"foreign_demand",name:"Foreign Treasury Demand", category:"flow",
        desc:"Foreign official sector participation in Treasury auctions — manual (Treasury TIC data)",
        options:[
          { label:"Increasing (active accumulation)", value:-2 },
          { label:"Stable",                           value:-1 },
          { label:"Modest decline",                   value: 0 },
          { label:"Declining notably",                value: 1 },
          { label:"Active reduction / selling",       value: 2 }
        ]},
      { id:"gold_buying",  name:"Central Bank Gold Buying", category:"flow",
        desc:"Official sector gold purchases — manual (World Gold Council)",
        options:[
          { label:"Below average (<500t/yr)",  value:-1 },
          { label:"Average (500-700t/yr)",     value: 0 },
          { label:"Elevated (700-900t/yr)",    value: 1 },
          { label:"Record levels (>900t/yr)",  value: 2 }
        ]},
      { id:"dollar_index", name:"Dollar Trend (DXY)", category:"flow",
        desc:"Trade-weighted dollar strength & direction — FRED: DTWEXBGS (year-over-year % change)",
        options:[
          { label:"Weakening significantly",                 value:-1 },
          { label:"Weakening modestly",                      value: 0 },
          { label:"Range-bound",                             value: 0 },
          { label:"Strengthening modestly",                  value: 1 },
          { label:"Strengthening significantly (milkshake)", value: 2 }
        ]},
    ];

    const regimeQuestions = [
      { id:"bond_regime",    name:"Secular Bond Regime",
        options:[
          { label:"Bull market (yields declining structurally)", value:"bull" },
          { label:"Transitional / Uncertain",                    value:"transition" },
          { label:"Bear market (yields rising structurally)",    value:"bear" }
        ]},
      { id:"reserve_regime", name:"Reserve Currency Regime",
        options:[
          { label:"Stable (dollar uncontested)",      value:"stable" },
          { label:"Stressed (alternatives emerging)", value:"stressed" },
          { label:"Crisis (active restructuring)",    value:"crisis" }
        ]},
      { id:"moral_hazard",   name:"Moral Hazard Phase",
        options:[
          { label:"Early (limited intervention history)",        value:"early" },
          { label:"Escalating (each rescue bigger than last)",   value:"escalating" },
          { label:"Terminal (intervention capacity exhausted)",  value:"terminal" }
        ]},
    ];

    /* ── FRED FETCH ────────────────────────────────────────────────────── */
    async function fetchFRED(seriesId, limit = 3, observationEnd = null) {
      let url = `https://api.stlouisfed.org/fred/series/observations?series_id=${seriesId}&api_key=${FRED_API_KEY}&file_type=json&sort_order=desc&limit=${limit}`;
      if (observationEnd) url += `&observation_end=${observationEnd}`;
      for (const ep of [url, `https://corsproxy.io/?${encodeURIComponent(url)}`, `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`]) {
        try {
          const res = await fetch(ep);
          if (!res.ok) continue;
          const json = await res.json();
          if (json.observations) return json.observations;
        } catch (_) { continue; }
      }
      return null;
    }

    function latestVal(obs) {
      if (!obs) return null;
      const found = obs.find(o => o.value !== "." && o.value !== "");
      return found ? parseFloat(found.value) : null;
    }

    function mapFromFRED(raw) {
      const u = {};
      if (raw.hy_spreads  !== null) { const b = raw.hy_spreads * 100; u.hy_spreads  = b < 350 ? -2 : b < 450 ? -1 : b < 550 ? 0 : b < 700 ? 1 : 2; }
      if (raw.sloos       !== null) { const n = raw.sloos;            u.sloos       = n < -20 ? -2 : n < -5  ? -1 : n < 10  ? 0 : n < 40  ? 1 : 2; }
      if (raw.yield_curve !== null) { const p = raw.yield_curve;      u.yield_curve = p < -0.5 ? -1 : p < 0 ? 0 : p < 0.5 ? 1 : p < 1.5 ? 2 : -1; }
      if (raw.real_yields !== null) { const p = raw.real_yields;      u.real_yields = p < -1 ? -2 : p < 0 ? -1 : p < 1.5 ? 0 : p < 2.5 ? 1 : 2; }
      if (raw.fed_current !== null && raw.fed_prior !== null) {
        const d = raw.fed_current - raw.fed_prior;
        u.fed_direction = d < -1 ? -2 : d < -0.25 ? -1 : Math.abs(d) <= 0.25 ? 0 : d < 1 ? 1 : 2;
      }
      if (raw.dxy_yoy !== null) { const p = raw.dxy_yoy; u.dollar_index = p < -5 ? -1 : p < 0 ? 0 : p < 5 ? 1 : 2; }
      return u;
    }

    /* ── CYCLE + SIGNAL MATH ───────────────────────────────────────────── */
    function getCyclePosition() {
      const yf = CURRENT_YEAR + (CURRENT_MONTH - 1) / 12;
      const lastTrough = BENNER_DATA.troughs.filter(y => y <= CURRENT_YEAR).pop();
      const nextPeak   = BENNER_DATA.peaks.find(y => y >= CURRENT_YEAR);
      const nextTrough = BENNER_DATA.troughs.find(y => y > CURRENT_YEAR);
      const nextPanic  = BENNER_DATA.panics.find(y => y > CURRENT_YEAR);
      return { lastTrough, nextPeak, nextTrough, nextPanic,
               progressTowardPeak: (yf - lastTrough) / (nextPeak - lastTrough) };
    }

    function getCompositeSignal(iv, rv) {
      const avg = (ids) => { const v = ids.map(id => iv[id]).filter(x => x != null); return v.length ? v.reduce((a,b)=>a+b,0)/v.length : 0; };
      const creditScore = avg(["hy_spreads","sloos"]);
      const rateScore   = avg(["yield_curve","real_yields","fed_direction"]);
      const flowScore   = avg(["foreign_demand","gold_buying","dollar_index"]);
      const mechScore   = (creditScore + rateScore + flowScore) / 3;
      const cp = getCyclePosition();
      const clockScore = cp.progressTowardPeak >= 0.85 ? 2 : cp.progressTowardPeak >= 0.70 ? 1.5 : cp.progressTowardPeak >= 0.50 ? 1 : cp.progressTowardPeak >= 0.30 ? 0 : -1;
      let rm = 1;
      if (rv.bond_regime    === "bear")       rm += 0.15;
      if (rv.reserve_regime === "stressed")   rm += 0.10;
      if (rv.reserve_regime === "crisis")     rm += 0.25;
      if (rv.moral_hazard   === "terminal")   rm += 0.20;
      if (rv.moral_hazard   === "escalating") rm += 0.10;
      return { composite: ((mechScore*0.6)+(clockScore*0.4))*rm, creditScore, rateScore, flowScore, clockScore, regimeMultiplier: rm };
    }

    /* ── CLAUDE PROMPT ─────────────────────────────────────────────────── */
    function generateClaudePrompt(iv, rv, signal, cp, liveData) {
      const sigLabel = signal.composite <= -1.2 ? "STRONG EXPANSION" : signal.composite <= -0.4 ? "EXPANSION"
                     : signal.composite <=  0.4 ? "NEUTRAL" : signal.composite <= 1.2 ? "CAUTION" : "ELEVATED RISK";
      const optLabel = (id) => { const ind = indicators.find(i=>i.id===id); return ind?.options.find(o=>o.value===iv[id])?.label || "not set"; };
      const regLabel = (id) => { const rq = regimeQuestions.find(r=>r.id===id); return rq?.options.find(o=>o.value===rv[id])?.label || "not set"; };
      const ld = liveData || {};
      return `You are writing the monthly analysis sections for the Acumen Macro Cycle Dashboard.
DATE: ${MONTH_LABEL}

INDICATOR READINGS:
HY Spreads (OAS): ${ld.hy_spreads != null ? (ld.hy_spreads*100).toFixed(0)+"bps" : "manual"} → ${optLabel("hy_spreads")}
SLOOS: ${ld.sloos != null ? ld.sloos.toFixed(1)+"% net tightening" : "manual"} → ${optLabel("sloos")}
Yield Curve (2s10s): ${ld.yield_curve != null ? (ld.yield_curve*100).toFixed(0)+"bps" : "manual"} → ${optLabel("yield_curve")}
Real Yields (TIPS): ${ld.real_yields != null ? ld.real_yields.toFixed(2)+"%" : "manual"} → ${optLabel("real_yields")}
Fed Funds: ${ld.fed_current != null ? ld.fed_current.toFixed(2)+"% (prior yr: "+ld.fed_prior?.toFixed(2)+"%)" : "manual"} → ${optLabel("fed_direction")}
Foreign Treasury Demand: manual → ${optLabel("foreign_demand")}
Central Bank Gold Buying: manual → ${optLabel("gold_buying")}
DXY (trade-weighted): ${ld.dxy_current != null ? ld.dxy_current.toFixed(1)+(ld.dxy_yoy!=null?" ("+ld.dxy_yoy.toFixed(1)+"% YoY)":"") : "manual"} → ${optLabel("dollar_index")}

COMPOSITE SIGNAL: ${signal.composite.toFixed(2)} — ${sigLabel}
  Credit: ${signal.creditScore.toFixed(2)} | Rate: ${signal.rateScore.toFixed(2)} | Flow: ${signal.flowScore.toFixed(2)}
  Regime multiplier: ×${signal.regimeMultiplier.toFixed(2)}

BENNER CYCLE: ${(cp.progressTowardPeak*100).toFixed(0)}% to ${cp.nextPeak} peak (from ${cp.lastTrough} trough) | Clock: ${signal.clockScore.toFixed(1)} | Next panic: ${cp.nextPanic}
REGIME: Bond: ${regLabel("bond_regime")} | Reserve: ${regLabel("reserve_regime")} | Moral hazard: ${regLabel("moral_hazard")}

---
FORMAT YOUR RESPONSE EXACTLY LIKE THIS (keep the ===SECTION=== delimiters — the page auto-parses them):

===THESIS===
[One bold opening sentence — the central tension or alignment]

===BODY===
[1-2 sentences explaining the data split]

===CONFIRMING_HEADER===
[E.g., CONFIRMING ${sigLabel}]

===CONFIRMING_BULLETS===
[bullet 1 — no bullet symbol, one per line]
[bullet 2]
[bullet 3]
[bullet 4]
[bullet 5]

===CONTRADICTING_HEADER===
[E.g., CONTRADICTING ${sigLabel}]

===CONTRADICTING_BULLETS===
[bullet 1]
[bullet 2]
[bullet 3]
[bullet 4]
[bullet 5]

===READ===
[Historical analog paragraph. Use **text** for bold, e.g. **Watch the X.**]

===DATA_INPUTS===
CREDIT: [indicator]: [raw value] ([date]) — [source]. [one sentence context].
CREDIT: [...]
RATE: [...]
RATE: [...]
RATE: [...]
FLOW: [...]
FLOW: [...]
FLOW: [...]`;
    }

    /* ── SHARED FIELD STYLES ───────────────────────────────────────────── */
    const fieldBase = {
      width: "100%", background: "#121212", border: "1px solid #333",
      borderRadius: 4, color: "#CCC",
      fontFamily: "'JetBrains Mono', monospace", fontSize: 10,
      padding: "7px 10px", lineHeight: 1.5,
    };
    const inputStyle  = { ...fieldBase };
    const taStyle     = { ...fieldBase, resize: "vertical" };
    const labelStyle  = { fontSize: 8, letterSpacing: 1.5, color: "#888", marginBottom: 4, display: "block" };

    /* ═══════════════════════════════════════════════════════════════════
       SUB-COMPONENTS
    ═══════════════════════════════════════════════════════════════════ */
    function SignalGauge({ value }) {
      const v = Math.max(-2, Math.min(2, value));
      const angle = -135 + ((v + 2) / 4) * 270;
      const [label, color] =
        v <= -1.2 ? ["STRONG EXPANSION","#22c55e"] : v <= -0.4 ? ["EXPANSION","#4ade80"] :
        v <=  0.4 ? ["NEUTRAL","#eab308"] : v <= 1.2 ? ["CAUTION","#f97316"] : ["ELEVATED RISK","#ef4444"];
      return (
        <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:8 }}>
          <svg viewBox="0 0 200 130" style={{ width:260, height:170 }}>
            <defs>
              <linearGradient id="gaugeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%"   stopColor="#22c55e"/><stop offset="35%" stopColor="#eab308"/>
                <stop offset="65%"  stopColor="#f97316"/><stop offset="100%" stopColor="#ef4444"/>
              </linearGradient>
            </defs>
            <path d="M 25 115 A 75 75 0 1 1 175 115" fill="none" stroke="#1A1A1A" strokeWidth="14" strokeLinecap="round"/>
            <path d="M 25 115 A 75 75 0 1 1 175 115" fill="none" stroke="url(#gaugeGrad)" strokeWidth="10" strokeLinecap="round" opacity="0.8"/>
            {[-135,-90,-45,0,45,90,135].map((a,i)=>{const r=a*Math.PI/180; return <line key={i} x1={100+65*Math.cos(r)} y1={115+65*Math.sin(r)} x2={100+58*Math.cos(r)} y2={115+58*Math.sin(r)} stroke="#444" strokeWidth="1.5"/>;})}
            <g transform={`rotate(${angle},100,115)`}>
              <polygon points="100,48 96,115 104,115" fill={color} opacity="0.9"/>
              <circle cx="100" cy="115" r="6" fill={color}/>
              <circle cx="100" cy="115" r="3" fill="#191919"/>
            </g>
            <text x="100" y="108" textAnchor="middle" fill="#888" fontSize="9" fontFamily="'JetBrains Mono',monospace">{v.toFixed(2)}</text>
          </svg>
          <div style={{ fontSize:13, fontWeight:700, letterSpacing:3, color, fontFamily:"'JetBrains Mono',monospace", textTransform:"uppercase" }}>{label}</div>
        </div>
      );
    }

    function CycleTimeline() {
      const toX = y => ((y - 1920) / 140) * 1000;
      return (
        <div style={{ overflowX:"auto", padding:"12px 0" }}>
          <svg viewBox="0 0 1000 180" style={{ width:"100%", minWidth:800, height:180 }}>
            <line x1={0} y1={90} x2={1000} y2={90} stroke="#333" strokeWidth="1"/>
            <line x1={toX(CURRENT_YEAR)} y1={15} x2={toX(CURRENT_YEAR)} y2={165} stroke="#f97316" strokeWidth="1.5" strokeDasharray="4,4" opacity="0.6"/>
            <text x={toX(CURRENT_YEAR)} y={12} textAnchor="middle" fill="#f97316" fontSize="9" fontWeight="700" fontFamily="'JetBrains Mono',monospace">NOW</text>
            {BENNER_DATA.peaks.map((y,i)=>{const x=toX(y),hi=y===2026;return(<g key={`p${i}`}><line x1={x} y1={60} x2={x} y2={90} stroke={hi?"#ef4444":"#ef444466"} strokeWidth={hi?2:1}/><circle cx={x} cy={55} r={hi?5:3} fill={hi?"#ef4444":"#ef444488"}/><text x={x} y={48} textAnchor="middle" fill={hi?"#ef4444":"#ef444488"} fontSize={hi?"8":"7"} fontFamily="'JetBrains Mono',monospace" fontWeight={hi?700:400}>{y}</text></g>);})}
            {BENNER_DATA.troughs.map((y,i)=>{const x=toX(y),hi=y===2023;return(<g key={`t${i}`}><line x1={x} y1={90} x2={x} y2={120} stroke={hi?"#22c55e":"#22c55e66"} strokeWidth={hi?2:1}/><circle cx={x} cy={125} r={hi?5:3} fill={hi?"#22c55e":"#22c55e66"}/><text x={x} y={138} textAnchor="middle" fill={hi?"#22c55e":"#22c55e66"} fontSize={hi?"8":"7"} fontFamily="'JetBrains Mono',monospace" fontWeight={hi?700:400}>{y}</text></g>);})}
            {BENNER_DATA.panics.map((y,i)=>{const x=toX(y),hi=y===2035;return(<g key={`pa${i}`}><line x1={x} y1={30} x2={x} y2={90} stroke={hi?"#a855f7":"#a855f766"} strokeWidth={hi?2:1} strokeDasharray="3,3"/><text x={x} y={26} textAnchor="middle" fill={hi?"#a855f7":"#a855f766"} fontSize={hi?"8":"7"} fontFamily="'JetBrains Mono',monospace" fontWeight={hi?700:400}>&#9889;{y}</text></g>);})}
            <g transform="translate(10,158)">
              <circle cx={0}   cy={0} r={3} fill="#ef4444"/><text x={8}   y={3} fill="#888" fontSize="7" fontFamily="'JetBrains Mono',monospace">Peak/Sell</text>
              <circle cx={80}  cy={0} r={3} fill="#22c55e"/><text x={88}  y={3} fill="#888" fontSize="7" fontFamily="'JetBrains Mono',monospace">Trough/Buy</text>
              <circle cx={170} cy={0} r={3} fill="#a855f7"/><text x={178} y={3} fill="#888" fontSize="7" fontFamily="'JetBrains Mono',monospace">Panic</text>
            </g>
          </svg>
        </div>
      );
    }

    function MiniBar({ value, max=2 }) {
      const c = Math.max(0,Math.min(1,(value+max)/(max*2)));
      const color = c<0.3?"#22c55e":c<0.5?"#4ade80":c<0.6?"#eab308":c<0.8?"#f97316":"#ef4444";
      return (<div style={{ width:"100%",height:6,background:"#1A1A1A",borderRadius:3,overflow:"hidden" }}><div style={{ width:`${c*100}%`,height:"100%",background:color,borderRadius:3,transition:"width 0.4s ease,background 0.4s ease" }}/></div>);
    }

    function ScoreBreakdown({ label, score, color }) {
      return (
        <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 12px",background:"#121212",borderRadius:6,border:"1px solid #333" }}>
          <span style={{ fontSize:11,color:"#888",fontFamily:"'JetBrains Mono',monospace",letterSpacing:1 }}>{label}</span>
          <div style={{ display:"flex",alignItems:"center",gap:8 }}>
            <div style={{ width:60 }}><MiniBar value={score}/></div>
            <span style={{ fontSize:12,fontWeight:700,color,fontFamily:"'JetBrains Mono',monospace",minWidth:40,textAlign:"right" }}>{score>0?"+":""}{score.toFixed(1)}</span>
          </div>
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════════════════════
       MAIN COMPONENT
    ═══════════════════════════════════════════════════════════════════ */
    function MacroCycleDashboard() {
      const [indicatorValues, setIndicatorValues] = useState({
        hy_spreads:-2, sloos:1, yield_curve:2, real_yields:1, fed_direction:-1,
        foreign_demand:1, gold_buying:2, dollar_index:-1,
      });
      const [regimeValues,       setRegimeValues]       = useState({ bond_regime:"bear", reserve_regime:"stressed", moral_hazard:"escalating" });
      const [expandedIndicator,  setExpandedIndicator]  = useState(null);
      const [liveData,           setLiveData]           = useState(null);
      const [dataStatus,         setDataStatus]         = useState("idle");
      const [copyStatus,         setCopyStatus]         = useState("idle");

      // Analysis content (dynamic, persisted to localStorage)
      const [analysis,  setAnalysis]  = useState(() => loadAnalysis());
      const [editOpen,  setEditOpen]  = useState(false);
      const [draft,     setDraft]     = useState(null);
      const [pasteText, setPasteText] = useState("");
      const [parseMsg,  setParseMsg]  = useState("");

      /* ── FRED auto-fetch ─────────────────────────────────────────── */
      useEffect(() => {
        if (!FRED_API_KEY || FRED_API_KEY.length < 10) return;
        setDataStatus("loading");
        (async () => {
          try {
            const yearAgo = new Date(_now); yearAgo.setFullYear(_now.getFullYear()-1);
            const yAgoStr = yearAgo.toISOString().split("T")[0];
            const [hyObs,sloosObs,ycObs,ryObs,fedCurObs,fedPriorObs,dxyCurObs,dxyPriorObs] = await Promise.all([
              fetchFRED("BAMLH0A0HYM2",5), fetchFRED("DRTSCILM",5), fetchFRED("T10Y2Y",5), fetchFRED("DFII10",5),
              fetchFRED("FEDFUNDS",3), fetchFRED("FEDFUNDS",3,yAgoStr), fetchFRED("DTWEXBGS",5), fetchFRED("DTWEXBGS",5,yAgoStr),
            ]);
            const fedCur=latestVal(fedCurObs), fedPrior=latestVal(fedPriorObs);
            const dxyCur=latestVal(dxyCurObs), dxyPrior=latestVal(dxyPriorObs);
            const raw = {
              hy_spreads:latestVal(hyObs), sloos:latestVal(sloosObs),
              yield_curve:latestVal(ycObs), real_yields:latestVal(ryObs),
              fed_current:fedCur, fed_prior:fedPrior,
              dxy_current:dxyCur, dxy_prior:dxyPrior,
              dxy_yoy:(dxyCur&&dxyPrior) ? (dxyCur-dxyPrior)/dxyPrior*100 : null,
            };
            setIndicatorValues(prev => ({ ...prev, ...mapFromFRED(raw) }));
            setLiveData(raw);
            setDataStatus("loaded");
          } catch (e) { console.error(e); setDataStatus("error"); }
        })();
      }, []);

      const signal   = useMemo(() => getCompositeSignal(indicatorValues, regimeValues), [indicatorValues, regimeValues]);
      const cyclePos = getCyclePosition();

      /* ── Edit panel handlers ─────────────────────────────────────── */
      const handleOpenEdit = () => { setDraft({ ...analysis }); setPasteText(""); setParseMsg(""); setEditOpen(true); };

      const handleParse = () => {
        if (!pasteText.trim()) { setParseMsg("Paste Claude's output above first."); return; }
        const parsed = parseClaudeOutput(pasteText);
        if (!Object.keys(parsed).length) { setParseMsg("⚠ Could not find ===SECTION=== delimiters. Check Claude used the required format."); return; }
        setDraft(prev => ({ ...prev, ...parsed }));
        setParseMsg(`✓ Parsed ${Object.keys(parsed).length} of 8 sections. Review below, then Save.`);
      };

      const handleSave = () => {
        setAnalysis(draft);
        saveAnalysis(draft);
        setEditOpen(false);
        setDraft(null);
        setPasteText("");
        setParseMsg("");
      };

      const handleCancel = () => { setEditOpen(false); setDraft(null); setPasteText(""); setParseMsg(""); };

      const setD = (field) => (e) => setDraft(p => ({ ...p, [field]: e.target.value }));

      /* ── Copy prompt handler ─────────────────────────────────────── */
      const handleCopyPrompt = () => {
        const text = generateClaudePrompt(indicatorValues, regimeValues, signal, cyclePos, liveData);
        const fallback = () => { const ta=document.createElement("textarea"); ta.value=text; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta); };
        (navigator.clipboard?.writeText(text) || Promise.reject()).catch(fallback);
        setCopyStatus("copied");
        setTimeout(() => setCopyStatus("idle"), 2500);
      };

      const catLabels = { credit:"CREDIT", rate:"RATE", flow:"FLOW" };
      const catColors = { credit:"#3b82f6", rate:"#eab308", flow:"#a855f7" };
      const statusChip = dataStatus==="loading" ? { text:"Fetching live data…", color:"#F5C542" }
                       : dataStatus==="loaded"  ? { text:"Live data loaded",     color:"#22c55e" }
                       : dataStatus==="error"   ? { text:"Fetch failed — using defaults", color:"#ef4444" } : null;
      const autoFedIds = ["hy_spreads","sloos","yield_curve","real_yields","fed_direction","dollar_index"];

      /* ── RENDER ──────────────────────────────────────────────────── */
      return (
        <div style={{ fontFamily:"'JetBrains Mono','SF Mono','Fira Code',monospace", background:"#191919", color:"#E0E0E0", minHeight:"100vh", padding:"60px 16px 24px" }}>

          {/* HEADER */}
          <div style={{ maxWidth:900, margin:"0 auto", marginBottom:32 }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="-10 -10 220 200" width="28" height="28">
                  <polygon points="50,0 150,0 200,87 150,174 50,174 0,87" fill="none" stroke="#F5C542" strokeWidth="18" strokeLinejoin="round"/>
                  <text x="100" y="128" textAnchor="middle" fontSize="84" fontFamily="'Segoe UI',system-ui,sans-serif" fontWeight="500" fill="#F5C542">A</text>
                </svg>
                <span style={{ fontSize:11, fontWeight:700, letterSpacing:4, color:"#F5C542" }}>ACUMEN</span>
              </div>
              {statusChip && <span style={{ fontSize:9, color:statusChip.color, letterSpacing:1, fontFamily:"'JetBrains Mono',monospace" }}>{statusChip.text}</span>}
            </div>
            <h1 style={{ fontSize:22, fontWeight:300, margin:"8px 0 4px", letterSpacing:1, color:"#FFFFFF" }}>Macro Cycle Dashboard</h1>
            <p style={{ fontSize:10, color:"#888", letterSpacing:2, margin:0 }}>BENNER CYCLE &#215; MECHANICAL INDICATORS — {MONTH_LABEL.toUpperCase()}</p>
          </div>

          <div style={{ maxWidth:900, margin:"0 auto" }}>

            {/* CYCLE TIMELINE */}
            <div style={{ background:"#1E1E1E", borderRadius:8, border:"1px solid #333", padding:"16px 16px 8px", marginBottom:20 }}>
              <div style={{ fontSize:9, letterSpacing:2, color:"#888", marginBottom:8 }}>BENNER CYCLE TIMELINE — 1920–2060</div>
              <CycleTimeline/>
            </div>

            {/* CLOCK + COMPOSITE */}
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, marginBottom:20 }}>
              <div style={{ background:"#1E1E1E", borderRadius:8, border:"1px solid #333", padding:20 }}>
                <div style={{ fontSize:9, letterSpacing:2, color:"#888", marginBottom:16 }}>CYCLE CLOCK POSITION</div>
                <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
                  {[["Last Trough (Buy)",cyclePos.lastTrough,"#22c55e"],["Next Peak (Sell)",cyclePos.nextPeak,"#ef4444"],["Next Panic",cyclePos.nextPanic,"#a855f7"],["Next Trough",cyclePos.nextTrough,"#22c55e"]].map(([l,v,c])=>(
                    <div key={l} style={{ display:"flex", justifyContent:"space-between" }}>
                      <span style={{ fontSize:10, color:"#888" }}>{l}</span>
                      <span style={{ fontSize:12, fontWeight:700, color:c }}>{v}</span>
                    </div>
                  ))}
                  <div style={{ height:1, background:"#333", margin:"4px 0" }}/>
                  <div>
                    <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
                      <span style={{ fontSize:10, color:"#888" }}>Progress to Peak</span>
                      <span style={{ fontSize:12, fontWeight:700, color:"#f97316" }}>{(cyclePos.progressTowardPeak*100).toFixed(0)}%</span>
                    </div>
                    <div style={{ width:"100%", height:8, background:"#1A1A1A", borderRadius:4, overflow:"hidden" }}>
                      <div style={{ width:`${Math.min(100,cyclePos.progressTowardPeak*100)}%`, height:"100%", background:"linear-gradient(90deg,#22c55e,#eab308,#ef4444)", borderRadius:4, transition:"width 0.5s ease" }}/>
                    </div>
                  </div>
                  <div style={{ fontSize:10, color:"#888", fontStyle:"italic", lineHeight:1.4, marginTop:4 }}>
                    Clock score: {signal.clockScore.toFixed(1)} — {cyclePos.progressTowardPeak>=0.85?"At predicted peak":cyclePos.progressTowardPeak>=0.70?"Approaching peak zone":"Mid-cycle"}
                  </div>
                </div>
              </div>
              <div style={{ background:"#1E1E1E", borderRadius:8, border:"1px solid #333", padding:20, display:"flex", flexDirection:"column", alignItems:"center" }}>
                <div style={{ fontSize:9, letterSpacing:2, color:"#888", marginBottom:8, alignSelf:"flex-start" }}>COMPOSITE SIGNAL</div>
                <SignalGauge value={signal.composite}/>
                <div style={{ width:"100%", display:"flex", flexDirection:"column", gap:6, marginTop:12 }}>
                  <ScoreBreakdown label="CREDIT" score={signal.creditScore} color={signal.creditScore>0.5?"#f97316":signal.creditScore<-0.5?"#22c55e":"#eab308"}/>
                  <ScoreBreakdown label="RATE"   score={signal.rateScore}   color={signal.rateScore>0.5?"#f97316":signal.rateScore<-0.5?"#22c55e":"#eab308"}/>
                  <ScoreBreakdown label="FLOW"   score={signal.flowScore}   color={signal.flowScore>0.5?"#f97316":signal.flowScore<-0.5?"#22c55e":"#eab308"}/>
                </div>
                <div style={{ fontSize:9, color:"#777", marginTop:10, textAlign:"center", lineHeight:1.4 }}>Regime multiplier: &#215;{signal.regimeMultiplier.toFixed(2)} — 8/8 inputs</div>
              </div>
            </div>

            {/* MECHANICAL INDICATORS */}
            <div style={{ background:"#1E1E1E", borderRadius:8, border:"1px solid #333", padding:20, marginBottom:20 }}>
              <div style={{ fontSize:9, letterSpacing:2, color:"#888", marginBottom:16 }}>MECHANICAL INDICATORS — SET CURRENT CONDITIONS</div>
              <div style={{ display:"flex", flexDirection:"column", gap:2 }}>
                {indicators.map(ind => {
                  const isOpen = expandedIndicator === ind.id;
                  const curOpt = ind.options.find(o => o.value === indicatorValues[ind.id]);
                  const isAuto = dataStatus==="loaded" && autoFedIds.includes(ind.id);
                  return (
                    <div key={ind.id} style={{ background:isOpen?"#242424":"transparent", borderRadius:6, overflow:"hidden", border:isOpen?"1px solid #333":"1px solid transparent", transition:"all 0.2s ease" }}>
                      <div onClick={()=>setExpandedIndicator(isOpen?null:ind.id)} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"10px 12px", cursor:"pointer", borderLeft:`3px solid ${catColors[ind.category]}` }}>
                        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                          <span style={{ fontSize:8, fontWeight:700, letterSpacing:1, color:catColors[ind.category], minWidth:42 }}>{catLabels[ind.category]}</span>
                          <span style={{ fontSize:11, color:"#CCC" }}>{ind.name}</span>
                          {isAuto && <span style={{ fontSize:7, color:"#22c55e", letterSpacing:1, border:"1px solid #22c55e44", borderRadius:3, padding:"1px 4px" }}>LIVE</span>}
                        </div>
                        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                          {curOpt && <span style={{ fontSize:10, color:"#888", maxWidth:180, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{curOpt.label}</span>}
                          <span style={{ fontSize:10, color:"#888", display:"inline-block", transform:isOpen?"rotate(180deg)":"none", transition:"transform 0.2s" }}>&#9660;</span>
                        </div>
                      </div>
                      {isOpen && (
                        <div style={{ padding:"4px 12px 12px 18px" }}>
                          <p style={{ fontSize:10, color:"#888", margin:"0 0 10px", lineHeight:1.4 }}>{ind.desc}</p>
                          <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
                            {ind.options.map((opt,i)=>{
                              const sel = indicatorValues[ind.id]===opt.value;
                              return (
                                <div key={i} onClick={()=>{ setIndicatorValues(p=>({...p,[ind.id]:opt.value})); setExpandedIndicator(null); }}
                                     style={{ padding:"8px 12px", borderRadius:4, cursor:"pointer", fontSize:11, transition:"all 0.15s ease", color:sel?"#FFFFFF":"#999", background:sel?"#242424":"transparent", border:sel?"1px solid #F5C542":"1px solid transparent" }}
                                     onMouseEnter={e=>{if(!sel)e.currentTarget.style.background="#1A1A1A";}}
                                     onMouseLeave={e=>{if(!sel)e.currentTarget.style.background="transparent";}}>
                                  <span style={{ marginRight:8, opacity:sel?1:0.3 }}>&#9679;</span>{opt.label}
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>

            {/* REGIME OVERLAY */}
            <div style={{ background:"#1E1E1E", borderRadius:8, border:"1px solid #333", padding:20, marginBottom:20 }}>
              <div style={{ fontSize:9, letterSpacing:2, color:"#888", marginBottom:16 }}>STRUCTURAL REGIME OVERLAY</div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:12 }}>
                {regimeQuestions.map(rq=>(
                  <div key={rq.id}>
                    <div style={{ fontSize:10, color:"#888", marginBottom:8, fontWeight:500 }}>{rq.name}</div>
                    <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
                      {rq.options.map(opt=>{
                        const sel = regimeValues[rq.id]===opt.value;
                        return (<div key={opt.value} onClick={()=>setRegimeValues(p=>({...p,[rq.id]:opt.value}))} style={{ padding:"6px 10px", borderRadius:4, cursor:"pointer", fontSize:10, lineHeight:1.3, transition:"all 0.15s ease", color:sel?"#FFFFFF":"#888", background:sel?"#242424":"transparent", border:sel?"1px solid #F5C542":"1px solid #333" }}>{opt.label}</div>);
                      })}
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* ── SIGNAL INTERPRETATION ─────────────────────────────── */}
            <div style={{ background:"#1E1E1E", borderRadius:8, border:"1px solid #333", borderLeft:"3px solid #F5C542", padding:20, marginBottom: editOpen ? 0 : 20 }}>
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10 }}>
                <div style={{ fontSize:9, letterSpacing:2, color:"#F5C542" }}>&#9889; SIGNAL INTERPRETATION — {MONTH_LABEL.toUpperCase()}</div>
                <div style={{ display:"flex", gap:8 }}>
                  <button onClick={handleOpenEdit} disabled={editOpen}
                          style={{ fontSize:9, letterSpacing:1, cursor:editOpen?"default":"pointer", padding:"4px 12px", borderRadius:4, border:"1px solid #333", background:"#242424", color:editOpen?"#777":"#AAAAAA", fontFamily:"'JetBrains Mono',monospace", transition:"all 0.2s" }}>
                    UPDATE ANALYSIS
                  </button>
                  <button onClick={handleCopyPrompt}
                          style={{ fontSize:9, letterSpacing:1, cursor:"pointer", padding:"4px 12px", borderRadius:4, border:`1px solid ${copyStatus==="copied"?"#22c55e":"#333"}`, background:copyStatus==="copied"?"#0d1f0d":"#242424", color:copyStatus==="copied"?"#22c55e":"#AAAAAA", fontFamily:"'JetBrains Mono',monospace", transition:"all 0.2s" }}>
                    {copyStatus==="copied" ? "&#10003; COPIED" : "COPY PROMPT FOR CLAUDE"}
                  </button>
                </div>
              </div>

              {/* Rendered analysis content */}
              <div style={{ fontSize:12, color:"#CCC", lineHeight:1.8 }}>
                <strong style={{ color:"#FFFFFF" }}>{analysis.thesis}</strong>{" "}{analysis.body}
              </div>
              <div style={{ marginTop:12, display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
                <div style={{ padding:12, background:"#121212", borderRadius:6, border:"1px solid #333" }}>
                  <div style={{ fontSize:9, color:"#ef4444", letterSpacing:1, marginBottom:6 }}>{analysis.confirmingHeader}</div>
                  <div style={{ fontSize:10, color:"#888", lineHeight:1.6 }}>
                    {parseBullets(analysis.confirmingBullets).map((b,i,a)=>(
                      <React.Fragment key={i}>• {b}{i<a.length-1&&<br/>}</React.Fragment>
                    ))}
                  </div>
                </div>
                <div style={{ padding:12, background:"#121212", borderRadius:6, border:"1px solid #333" }}>
                  <div style={{ fontSize:9, color:"#22c55e", letterSpacing:1, marginBottom:6 }}>{analysis.contradictingHeader}</div>
                  <div style={{ fontSize:10, color:"#888", lineHeight:1.6 }}>
                    {parseBullets(analysis.contradictingBullets).map((b,i,a)=>(
                      <React.Fragment key={i}>• {b}{i<a.length-1&&<br/>}</React.Fragment>
                    ))}
                  </div>
                </div>
              </div>
              <div style={{ marginTop:12, fontSize:11, color:"#999", lineHeight:1.7, borderTop:"1px solid #333", paddingTop:12 }}>
                <strong style={{ color:"#F5C542" }}>Read:</strong>{" "}{renderBold(analysis.readParagraph)}
              </div>
            </div>

            {/* ── EDIT PANEL ────────────────────────────────────────── */}
            {editOpen && draft && (
              <div style={{ background:"#1E1E1E", borderRadius:"0 0 8px 8px", border:"1px solid #F5C542", borderTop:"none", padding:24, marginBottom:20 }}>
                <div style={{ fontSize:9, letterSpacing:2, color:"#F5C542", marginBottom:16 }}>UPDATE MONTHLY ANALYSIS</div>

                {/* Step 1: Paste */}
                <div style={{ marginBottom:16 }}>
                  <label style={{ ...labelStyle }}>STEP 1 — PASTE CLAUDE'S OUTPUT, THEN CLICK PARSE (OR SKIP AND EDIT FIELDS DIRECTLY)</label>
                  <textarea value={pasteText} onChange={e=>setPasteText(e.target.value)} rows={7} placeholder={"Paste Claude's output here — it should contain ===THESIS===, ===BODY===, etc. sections…"} style={{ ...taStyle }}/>
                  <div style={{ display:"flex", alignItems:"center", gap:12, marginTop:8 }}>
                    <button onClick={handleParse} style={{ padding:"5px 16px", background:"#242424", border:"1px solid #F5C542", borderRadius:4, color:"#F5C542", fontSize:9, letterSpacing:1, cursor:"pointer", fontFamily:"'JetBrains Mono',monospace" }}>
                      PARSE &amp; FILL FIELDS
                    </button>
                    {parseMsg && <span style={{ fontSize:9, color:parseMsg.startsWith("✓")?"#22c55e":"#f97316", fontFamily:"'JetBrains Mono',monospace" }}>{parseMsg}</span>}
                  </div>
                </div>

                <div style={{ height:1, background:"#333", margin:"16px 0" }}/>
                <div style={{ fontSize:9, letterSpacing:2, color:"#888", marginBottom:16 }}>STEP 2 — REVIEW &amp; EDIT FIELDS</div>

                {/* Thesis */}
                <div style={{ marginBottom:12 }}>
                  <label style={{ ...labelStyle }}>THESIS (bold opening sentence)</label>
                  <input value={draft.thesis||""} onChange={setD("thesis")} style={{ ...inputStyle }}/>
                </div>

                {/* Body */}
                <div style={{ marginBottom:16 }}>
                  <label style={{ ...labelStyle }}>BODY TEXT (follows thesis on same line)</label>
                  <textarea value={draft.body||""} onChange={setD("body")} rows={2} style={{ ...taStyle }}/>
                </div>

                {/* Confirming + Contradicting */}
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:16 }}>
                  <div>
                    <label style={{ ...labelStyle, color:"#ef4444" }}>CONFIRMING SECTION HEADER</label>
                    <input value={draft.confirmingHeader||""} onChange={setD("confirmingHeader")} style={{ ...inputStyle, marginBottom:8 }}/>
                    <label style={{ ...labelStyle }}>CONFIRMING BULLETS — one per line, no bullet symbol</label>
                    <textarea value={draft.confirmingBullets||""} onChange={setD("confirmingBullets")} rows={7} style={{ ...taStyle }}/>
                  </div>
                  <div>
                    <label style={{ ...labelStyle, color:"#22c55e" }}>CONTRADICTING SECTION HEADER</label>
                    <input value={draft.contradictingHeader||""} onChange={setD("contradictingHeader")} style={{ ...inputStyle, marginBottom:8 }}/>
                    <label style={{ ...labelStyle }}>CONTRADICTING BULLETS — one per line, no bullet symbol</label>
                    <textarea value={draft.contradictingBullets||""} onChange={setD("contradictingBullets")} rows={7} style={{ ...taStyle }}/>
                  </div>
                </div>

                {/* Read paragraph */}
                <div style={{ marginBottom:16 }}>
                  <label style={{ ...labelStyle }}>"READ:" PARAGRAPH — use **text** to bold key terms</label>
                  <textarea value={draft.readParagraph||""} onChange={setD("readParagraph")} rows={4} style={{ ...taStyle }}/>
                </div>

                {/* Data inputs */}
                <div style={{ marginBottom:20 }}>
                  <label style={{ ...labelStyle }}>DATA INPUTS — prefix each line: CREDIT: / RATE: / FLOW:</label>
                  <textarea value={draft.dataInputs||""} onChange={setD("dataInputs")} rows={9} style={{ ...taStyle }}/>
                </div>

                {/* Save / Cancel */}
                <div style={{ display:"flex", justifyContent:"flex-end", gap:10 }}>
                  <button onClick={handleCancel} style={{ padding:"6px 18px", background:"transparent", border:"1px solid #333", borderRadius:4, color:"#888", fontSize:9, letterSpacing:1, cursor:"pointer", fontFamily:"'JetBrains Mono',monospace" }}>CANCEL</button>
                  <button onClick={handleSave}   style={{ padding:"6px 18px", background:"#F5C542", border:"none", borderRadius:4, color:"#121212", fontSize:9, letterSpacing:1, cursor:"pointer", fontWeight:700, fontFamily:"'JetBrains Mono',monospace" }}>SAVE &amp; CLOSE</button>
                </div>
              </div>
            )}

            {/* HISTORICAL ANALOGS */}
            <div style={{ background:"#1E1E1E", borderRadius:8, border:"1px solid #333", padding:20, marginBottom:20 }}>
              <div style={{ fontSize:9, letterSpacing:2, color:"#888", marginBottom:16 }}>HISTORICAL ANALOGS — PREVIOUS BENNER B-PEAK YEARS</div>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:8 }}>
                {[
                  { year:1972, event:"Pre-oil shock. Nixon price controls. Inflation hidden.",  next:"1973 oil embargo, -48% S&P bear", descent:"3yr" },
                  { year:1989, event:"Japan peak. S&L crisis. Junk bond collapse.",            next:"1990 recession, Japan lost decade", descent:"7yr" },
                  { year:1999, event:"Dot-com mania. Tech speculation peak.",                   next:"2000-02 crash, -49% NASDAQ", descent:"6yr" },
                  { year:2007, event:"Housing bubble. Subprime excess.",                       next:"2008 financial crisis, -57% S&P", descent:"5yr" },
                ].map(a=>(
                  <div key={a.year} style={{ padding:12, background:"#121212", borderRadius:6, border:"1px solid #333" }}>
                    <div style={{ fontSize:18, fontWeight:700, color:"#ef4444", marginBottom:6 }}>{a.year}</div>
                    <div style={{ fontSize:9, color:"#888", lineHeight:1.5, marginBottom:8 }}>{a.event}</div>
                    <div style={{ fontSize:9, color:"#888", lineHeight:1.5 }}><span style={{ color:"#F5C542" }}>&#8594;</span> {a.next}</div>
                    <div style={{ fontSize:8, color:"#777", marginTop:6 }}>Descent: {a.descent}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* DATA INPUTS — rendered from analysis state */}
            <div style={{ padding:"16px 20px", borderRadius:8, border:"1px solid #242424", marginBottom:20 }}>
              <div style={{ fontSize:9, letterSpacing:2, color:"#777", marginBottom:8 }}>DATA INPUTS — AS OF {MONTH_LABEL.toUpperCase()}</div>
              <div style={{ fontSize:10, color:"#888", lineHeight:1.8 }}>
                {parseDataLines(analysis.dataInputs).map(({ color, body, key }) => (
                  <React.Fragment key={key}><span style={{ color }}>&#9632;</span> {body}<br/></React.Fragment>
                ))}
              </div>
            </div>

            {/* METHODOLOGY */}
            <div style={{ padding:"16px 20px", borderRadius:8, border:"1px solid #242424", marginBottom:20 }}>
              <div style={{ fontSize:9, letterSpacing:2, color:"#777", marginBottom:8 }}>METHODOLOGY</div>
              <div style={{ fontSize:10, color:"#888", lineHeight:1.6 }}>
                Composite = (Mechanical &#215; 0.60 + Clock &#215; 0.40) &#215; Regime Multiplier. Mechanical score averages credit, rate, and flow sub-scores (&#8722;2 to +2 scale). Clock score derived from Benner cycle progress toward predicted peak. Regime multiplier adjusts for structural conditions. Signal range: &#8722;2.0 (strong expansion) to +2.0 (elevated risk). Benner cycle rows: B-peaks 8-9-10yr, C-troughs 7-11-9yr, A-panics 18-20-16yr. Backtested: 11/11 peaks, 11/12 troughs, 5/6 panics within 0–2 years (1924–2023). This is a framework, not financial advice.
              </div>
            </div>

            <div style={{ textAlign:"center", fontSize:8, color:"#666", letterSpacing:2, padding:"8px 0 24px" }}>ACUMEN RESEARCH — MACRO CYCLE FRAMEWORK v1.0</div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<MacroCycleDashboard/>);
  </script>
</body>
</html>
