  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 20px 24px 90px;
      background: #121212;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #FFFFFF;
    }
    .chart-wrap {
      background: #1E1E1E;
      border-radius: 12px;
      padding: 8px;
      margin-bottom: 20px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.45);
    }

    /* ── Category toggle buttons ── */
    #category-toggles {
      display: flex;
      gap: 10px;
      padding: 14px 14px 6px;
      flex-wrap: wrap;
    }
    .cat-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 16px;
      border-radius: 20px;
      border: 1px solid #333333;
      background: transparent;
      color: #AAAAAA;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, color 0.2s;
      font-family: inherit;
    }
    .cat-btn.active {
      border-color: #F5C542;
      background: rgba(245,197,66,0.10);
      color: #FFFFFF;
    }
    .cat-btn:hover {
      border-color: #F5C542;
      color: #FFFFFF;
    }
    .cat-btn .dots {
      display: inline-flex;
      gap: 3px;
      align-items: center;
    }
    .cat-btn .dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      transition: opacity 0.2s;
    }
    .cat-btn:not(.active) .dots span {
      opacity: 0.25;
    }
    .cat-btn:not(.active) {
      color: #555;
    }
  </style>

  <script>
    const CATEGORIES = {
      equities:    ['NASDAQ', 'Dow'],
      commodities: ['Oil (WTI)', 'Copper', 'Gold'],
      macro:       ['DXY', '10Y Yield', 'HY Spreads'],
      volatility:  ['VIX', 'MOVE'],
    };
    const catActive = { equities: true, commodities: true, macro: true, volatility: true };

    function toggleCategory(cat) {
      catActive[cat] = !catActive[cat];
      const btn = document.querySelector(`[data-cat="${cat}"]`);
      btn.classList.toggle('active', catActive[cat]);

      const chart1  = document.querySelector('#rolling-wrap .plotly-graph-div');
      const traces1 = chart1.data;
      const indices = [], visible = [];
      for (let i = 0; i < traces1.length; i++) {
        if (CATEGORIES[cat].includes(traces1[i].name)) {
          indices.push(i);
          visible.push(catActive[cat]);
        }
      }
      Plotly.restyle(chart1, { visible: visible }, indices);
    }
  </script>
