  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 20px 24px 90px;
      background: #121212;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #FFFFFF;
    }
    .chart-wrap {
      background: #1E1E1E;
      border-radius: 12px;
      padding: 8px;
      margin-bottom: 20px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.45);
    }

    /* ── Category toggle buttons ── */
    #category-toggles {
      display: flex;
      gap: 10px;
      padding: 14px 14px 6px;
      flex-wrap: wrap;
    }
    .cat-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 16px;
      border-radius: 20px;
      border: 1px solid #333333;
      background: transparent;
      color: #AAAAAA;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, color 0.2s;
      font-family: inherit;
    }
    .cat-btn.active {
      border-color: #F5C542;
      background: rgba(245,197,66,0.10);
      color: #FFFFFF;
    }
    .cat-btn:hover {
      border-color: #F5C542;
      color: #FFFFFF;
    }
    .cat-btn .dots {
      display: inline-flex;
      gap: 3px;
      align-items: center;
    }
    .cat-btn .dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      transition: opacity 0.2s;
    }
    .cat-btn:not(.active) .dots span {
      opacity: 0.25;
    }
    .cat-btn:not(.active) {
      color: #888;
    }
    .back-nav {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #AAAAAA;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 14px;
      padding: 4px 0;
      transition: color 0.2s;
    }
    .back-nav:hover { color: #F5C542; }
  </style>

<div id="update-status"></div>

<script>
const FRED_API_KEY = '824b29c5afa52f3fc7c6e7dc4925aebb';
const ROLL_WINDOW  = 60;
const DISPLAY_DAYS = 180;
const ASSET_ORDER  = ['NASDAQ','Dow','Oil (WTI)','Copper','Gold','DXY','10Y Yield','HY Spreads','VIX','MOVE'];
const ACCENT       = '#F5C542';
const NEG_COLOR    = '#EF5350';

function setLoading(on) {
  if (on) setStatus('Loading live data...', 'info');
}
function setStatus(msg, type) {
  const el = document.getElementById('update-status');
  el.textContent = msg; el.className = 'visible ' + type;
  el.style.display = 'block';
  if (type === 'success') setTimeout(() => { el.style.display = 'none'; }, 5000);
}

// ── Fetch helpers ──────────────────────────────────────────────────────────

async function fetchFRED(seriesId) {
  const d = new Date(); d.setDate(d.getDate() - 1825);
  const start = d.toISOString().slice(0, 10);
  const url = `https://api.stlouisfed.org/fred/series/observations?series_id=${seriesId}&api_key=${FRED_API_KEY}&file_type=json&observation_start=${start}`;
  const attempts = [
    url,
    `https://corsproxy.io/?${encodeURIComponent(url)}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  ];
  for (const attempt of attempts) {
    try {
      const resp = await fetch(attempt);
      if (!resp.ok) continue;
      const data = await resp.json();
      if (!data.observations) continue;
      const dates = [], values = [];
      for (const obs of data.observations) {
        if (obs.value !== '.') { dates.push(obs.date); values.push(parseFloat(obs.value)); }
      }
      if (dates.length > 0) return { dates, values };
    } catch (e) { continue; }
  }
  throw new Error(`FRED ${seriesId} failed`);
}

async function fetchBinanceBTC() {
  // Binance public API — no proxy needed, Monday-aligned weekly candles back to Aug 2017
  const url = 'https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1w&limit=1000';
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`Binance: ${resp.status}`);
  const data = await resp.json();
  const dates = [], values = [];
  for (const k of data) {
    dates.push(new Date(k[0]).toISOString().slice(0, 10));
    values.push(parseFloat(k[4]));
  }
  return { dates, values };
}

async function fetchYahoo(ticker, range) {
  const baseUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(ticker)}?range=${range}&interval=1d`;
  const proxies = [
    `https://corsproxy.io/?${encodeURIComponent(baseUrl)}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(baseUrl)}`,
  ];
  for (const proxyUrl of proxies) {
    try {
      const resp = await fetch(proxyUrl);
      if (!resp.ok) continue;
      const json  = await resp.json();
      const result = json.chart.result[0];
      const ts    = result.timestamp;
      const closes = result.indicators.quote[0].close;
      const dates = [], values = [];
      for (let i = 0; i < ts.length; i++) {
        if (closes[i] != null) {
          dates.push(new Date(ts[i] * 1000).toISOString().slice(0, 10));
          values.push(closes[i]);
        }
      }
      return { dates, values };
    } catch (e) { continue; }
  }
  throw new Error(`Yahoo ${ticker} failed`);
}

// ── Rolling Pearson correlation ─────────────────────────────────────────────

function pearson(x, y) {
  const n  = x.length;
  const mx = x.reduce((a, b) => a + b) / n;
  const my = y.reduce((a, b) => a + b) / n;
  const num = x.reduce((s, xi, i) => s + (xi - mx) * (y[i] - my), 0);
  const dx  = Math.sqrt(x.reduce((s, xi) => s + (xi - mx) ** 2, 0));
  const dy  = Math.sqrt(y.reduce((s, yi) => s + (yi - my) ** 2, 0));
  return (dx === 0 || dy === 0) ? 0 : num / (dx * dy);
}

function computeRollingCorr(btcDates, btcVals, assetDates, assetVals) {
  const btcMap = {}, assetMap = {};
  for (let i = 0; i < btcDates.length;   i++) btcMap[btcDates[i]]     = btcVals[i];
  for (let i = 0; i < assetDates.length; i++) assetMap[assetDates[i]] = assetVals[i];

  const common = [...new Set([...btcDates, ...assetDates])]
    .filter(d => btcMap[d] !== undefined && assetMap[d] !== undefined)
    .sort();
  if (common.length < ROLL_WINDOW + 2) return { dates: [], values: [] };

  const btcRets = [], assetRets = [], retDates = [];
  for (let i = 1; i < common.length; i++) {
    const d = common[i], dp = common[i - 1];
    btcRets.push((btcMap[d]   - btcMap[dp])   / btcMap[dp]);
    assetRets.push((assetMap[d] - assetMap[dp]) / assetMap[dp]);
    retDates.push(d);
  }

  const corrDates = [], corrVals = [];
  for (let i = ROLL_WINDOW - 1; i < btcRets.length; i++) {
    corrDates.push(retDates[i]);
    corrVals.push(pearson(
      btcRets.slice(i - ROLL_WINDOW + 1, i + 1),
      assetRets.slice(i - ROLL_WINDOW + 1, i + 1),
    ));
  }
  return { dates: corrDates, values: corrVals };
}

// ── Main update ────────────────────────────────────────────────────────────

async function updateData() {
  setLoading(true);
  try {
    setStatus('Fetching data from 11 sources...', 'info');

    const results = await Promise.allSettled([
      fetchBinanceBTC(),
      fetchYahoo('^IXIC',    '5y'),
      fetchYahoo('^DJI',     '5y'),
      fetchYahoo('CL=F',     '5y'),
      fetchYahoo('HG=F',     '5y'),
      fetchYahoo('GC=F',     '5y'),
      fetchYahoo('DX-Y.NYB', '5y'),
      fetchYahoo('^TNX',     '5y'),
      fetchFRED('BAMLH0A0HYM2'),
      fetchYahoo('^VIX',     '5y'),
      fetchYahoo('^MOVE',    '5y'),
    ]);

    const names = ['BTC','NASDAQ','Dow','Oil (WTI)','Copper','Gold',
                   'DXY','10Y Yield','HY Spreads','VIX','MOVE'];
    const rawData = {};
    const errors  = [];
    for (let i = 0; i < results.length; i++) {
      if (results[i].status === 'fulfilled') rawData[names[i]] = results[i].value;
      else errors.push(names[i]);
    }
    if (!rawData['BTC']) throw new Error('BTC data unavailable');

    setStatus('Computing rolling correlations...', 'info');

    const corrData = {};
    for (const name of ASSET_ORDER) {
      if (!rawData[name]) continue;
      const rc = computeRollingCorr(
        rawData['BTC'].dates, rawData['BTC'].values,
        rawData[name].dates,  rawData[name].values,
      );
      if (rc.dates.length > 0) corrData[name] = rc;
    }

    // ── Update Chart 1: Rolling correlation lines ──
    const chart1  = document.querySelector('#rolling-wrap .plotly-graph-div');
    const traces1 = chart1.data;
    for (let i = 0; i < traces1.length; i++) {
      const name = traces1[i].name;
      if (corrData[name]) {
        const rc  = corrData[name];
        const s   = Math.max(0, rc.dates.length - DISPLAY_DAYS);
        traces1[i].x = rc.dates.slice(s);
        traces1[i].y = rc.values.slice(s);
      }
    }
    const btcDates = rawData['BTC'].dates;
    const endDate  = new Date(btcDates[btcDates.length - 1])
      .toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
    chart1.layout.title.text =
      `What's BTC Correlated With?<br><sup>60-day rolling Pearson correlation of daily returns  |  as of ${endDate}</sup>`;
    Plotly.react(chart1, traces1, chart1.layout);

    // ── Update Chart 2: Snapshot bar chart ──
    const chart2 = document.querySelectorAll('.plotly-graph-div')[1];
    const sorted = [];
    for (const name of ASSET_ORDER) {
      if (corrData[name]) {
        const vals = corrData[name].values;
        sorted.push({ name, val: vals[vals.length - 1] });
      }
    }
    sorted.sort((a, b) => a.val - b.val);
    const barX  = sorted.map(x => x.val);
    const barY  = sorted.map(x => x.name);
    const barC  = barX.map(v => v >= 0 ? ACCENT : NEG_COLOR);
    const barTx = barX.map(v => (v >= 0 ? '+' : '') + v.toFixed(2));
    chart2.data[0].x              = barX;
    chart2.data[0].y              = barY;
    chart2.data[0].marker         = { ...chart2.data[0].marker, color: barC };
    chart2.data[0].text           = barTx;
    Plotly.react(chart2, chart2.data, chart2.layout);

    const msg = errors.length > 0
      ? `Updated (missing: ${errors.join(', ')}): ${new Date().toLocaleString()}`
      : `Updated: ${new Date().toLocaleString()}`;
    setStatus(msg, errors.length > 0 ? 'info' : 'success');
  } catch (err) {
    setStatus('Error: ' + err.message, 'error');
    console.error(err);
  } finally {
    setLoading(false);
  }
}
document.addEventListener('DOMContentLoaded', updateData);
</script></body>
